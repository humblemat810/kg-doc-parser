[pytest]
log_cli = true
log_cli_level = DEBUG
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S
addopts = -p no:langsmith
testpaths = test
markers =
    integration: marks tests as integration (deselect with -m "not integration")
[tool:pytest]
testpaths = test